apiVersion: apps/v1

kind: Deployment

metadata:
  name: flask-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask

  template:

    metadata:
      labels:
        app: flask

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:

      - name: flask

        image: 730649731642.dkr.ecr.eu-north-1.amazonaws.com/devops-task4-app:latest

        ports:
        - containerPort: 5000

        env:

        - name: APP_MESSAGE

          valueFrom:

            configMapKeyRef:

              name: flask-config

              key: APP_MESSAGE
