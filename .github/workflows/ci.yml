name: Build, Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t devops-task4-app .

      - name: Tag Docker Image
        run: |
          docker tag devops-task4-app:latest 730649731642.dkr.ecr.eu-north-1.amazonaws.com/devops-task4-app:latest

      - name: Push Docker Image
        run: |
          docker push 730649731642.dkr.ecr.eu-north-1.amazonaws.com/devops-task4-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-task4-cicd

            git pull origin main

            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 730649731642.dkr.ecr.eu-north-1.amazonaws.com

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml down

            docker compose -f docker-compose.prod.yml up -d

            docker image prune -f
